<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>산지니 원정대 - 캠퍼스 미션 어드벤처</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800;900&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --page-bg: #060912;
      --page-surface: rgba(15, 20, 31, 0.74);
      --page-border: rgba(255,255,255,0.08);
      --page-text: #f5f7ff;
      --page-muted: rgba(245,247,255,0.64);
      --shadow: 0 24px 70px rgba(3,7,18,0.3);
      --navy: #183a66;
      --blue: #2b67b3;
      --yellow: #ffd65a;
      --cream: #fff8e7;
      --red: #ff5d5d;
    }
    [data-theme="light"] {
      --page-bg: #eef4ff;
      --page-surface: rgba(255,255,255,0.86);
      --page-border: rgba(0,0,0,0.08);
      --page-text: #101728;
      --page-muted: rgba(16,23,40,0.62);
      --shadow: 0 24px 70px rgba(62,88,124,0.18);
    }
    html, body { min-height: 100%; }
    body {
      font-family: "Noto Sans KR", sans-serif;
      background:
        radial-gradient(circle at top, rgba(101,149,255,0.18), transparent 35%),
        linear-gradient(180deg, var(--page-bg), color-mix(in srgb, var(--page-bg) 90%, #10162a));
      color: var(--page-text);
      min-height: 100vh;
      overflow-x: hidden;
    }
    #starsCanvas { position: fixed; inset: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; opacity: 0.72; }
    [data-theme="light"] #starsCanvas { opacity: 0.2; }
    body > *:not(#starsCanvas) { position: relative; z-index: 1; }
    .back-link {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 22px 24px 0; color: var(--page-muted); text-decoration: none;
      font-size: 14px; font-weight: 700;
    }
    .back-link:hover { color: var(--page-text); }
    .page {
      max-width: 1120px; margin: 0 auto; padding: 12px 24px 42px;
      display: grid; grid-template-columns: minmax(0, 1fr) minmax(360px, 432px); gap: 28px;
      align-items: start;
    }
    .copy {
      background: var(--page-surface); border: 1px solid var(--page-border);
      border-radius: 28px; padding: 28px; backdrop-filter: blur(18px); box-shadow: var(--shadow);
    }
    .eyebrow {
      display: inline-flex; align-items: center; gap: 8px;
      color: var(--page-muted); font-size: 12px; font-weight: 800;
      letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 16px;
    }
    .eyebrow::before { content: ""; width: 28px; height: 1px; background: currentColor; }
    .copy h1 {
      font-family: "Space Grotesk", "Noto Sans KR", sans-serif;
      font-size: clamp(2.3rem, 5vw, 4.4rem); line-height: 0.96; letter-spacing: -0.04em;
      margin-bottom: 16px;
    }
    .copy p { color: var(--page-muted); font-size: 15px; line-height: 1.9; }
    .copy-list { display: grid; gap: 12px; margin-top: 22px; }
    .copy-item {
      padding: 16px; border-radius: 18px;
      background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05);
    }
    [data-theme="light"] .copy-item { background: rgba(11,18,32,0.03); border-color: rgba(11,18,32,0.05); }
    .copy-item strong { display: block; margin-bottom: 4px; font-size: 14px; }
    .copy-item span { color: var(--page-muted); font-size: 13px; line-height: 1.7; }
    .theme-toggle {
      margin-top: 22px; border: 1px solid var(--page-border); border-radius: 999px;
      background: transparent; color: var(--page-text); cursor: pointer;
      padding: 10px 16px; font-family: inherit; font-size: 13px; font-weight: 800;
    }
    .frame {
      width: 100%; border-radius: 36px; padding: 10px;
      background: rgba(255,255,255,0.16); border: 1px solid rgba(255,255,255,0.24);
      backdrop-filter: blur(16px); box-shadow: var(--shadow);
    }
    .frame-inner {
      position: relative; min-height: 780px; overflow: hidden; border-radius: 28px;
      border: 1px solid rgba(255,255,255,0.62);
      background: linear-gradient(180deg, #68bbff, #a6e1ff 36%, #f0fbff 100%);
    }
    .frame-inner::before {
      content: ""; position: absolute; inset: 0; pointer-events: none; opacity: 0.35;
      background-image:
        linear-gradient(rgba(255,255,255,0.28) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.28) 1px, transparent 1px);
      background-size: 20px 20px;
    }
    .shell-top {
      position: relative; z-index: 2; margin: 14px 14px 0; padding: 14px 16px;
      display: flex; justify-content: space-between; align-items: center;
      border-radius: 20px; background: rgba(255,255,255,0.24); color: #fff;
      backdrop-filter: blur(12px);
    }
    .shell-top small {
      display: block; font-size: 11px; font-weight: 900; letter-spacing: 0.18em;
      color: rgba(255,255,255,0.78); margin-bottom: 4px;
    }
    .shell-top strong { font-size: 14px; font-weight: 900; }
    .streak-pill {
      padding: 8px 12px; border-radius: 999px; background: rgba(255,255,255,0.84);
      color: var(--blue); font-size: 12px; font-weight: 900;
    }
    #app { position: relative; z-index: 2; padding: 18px 14px 16px; min-height: 712px; }
    .scene { display: flex; flex-direction: column; gap: 16px; min-height: 100%; }
    .pill {
      display: inline-flex; padding: 8px 14px; border-radius: 999px;
      background: rgba(255,255,255,0.82); color: var(--blue); font-size: 12px; font-weight: 900;
      box-shadow: 0 14px 24px rgba(24,58,102,0.12);
    }
    .scene-title {
      color: #fff; font-size: clamp(2rem, 7vw, 2.5rem); line-height: 0.98;
      letter-spacing: -0.04em; font-weight: 900; margin-top: 8px;
      text-shadow: 0 4px 14px rgba(24,58,102,0.16);
    }
    .scene-subtitle {
      color: rgba(255,255,255,0.94); font-size: 14px; line-height: 1.8;
      max-width: 280px; margin-top: 10px; font-weight: 700;
    }
    .character-wrap { position: relative; display: flex; justify-content: center; padding: 8px 0; }
    .character-wrap::before {
      content: ""; position: absolute; inset: 18px 20px auto; height: 220px;
      background: radial-gradient(circle at center, rgba(255,255,255,0.35), transparent 70%);
      filter: blur(18px);
    }
    .character-card {
      position: relative; width: min(100%, 312px); padding: 12px; border-radius: 30px;
      background: linear-gradient(180deg, rgba(255,255,255,0.96), rgba(225,245,255,0.96));
      border: 1px solid rgba(255,255,255,0.75); box-shadow: 0 20px 42px rgba(24,58,102,0.18);
      animation: bob 4.2s ease-in-out infinite;
    }
    .character-card.celebrate { animation-duration: 3.1s; }
    .visual { position: relative; height: 306px; overflow: hidden; border-radius: 24px; background: linear-gradient(180deg, #9bd4ff, #effaff); }
    .visual img { width: 100%; height: 100%; object-fit: cover; object-position: center 72%; transform: scale(1.14); display: block; }
    .visual::after { content: ""; position: absolute; inset: auto 0 0; height: 92px; background: linear-gradient(180deg, transparent, rgba(239,250,255,0.95)); }
    .bubble {
      position: absolute; padding: 9px 12px; border-radius: 18px; font-size: 12px;
      font-weight: 900; box-shadow: 0 12px 20px rgba(24,58,102,0.12);
    }
    .bubble.left { left: -4px; top: 30px; background: rgba(255,255,255,0.96); color: var(--blue); }
    .bubble.right { right: -4px; bottom: 28px; background: var(--yellow); color: var(--navy); }
    .sparkle { position: absolute; color: #fff7be; font-size: 20px; animation: sparkle 2.1s ease-in-out infinite; }
    .sparkle.one { right: 28px; top: 32px; }
    .sparkle.two { left: 34px; bottom: 56px; animation-delay: -0.7s; }
    .card {
      border-radius: 28px; background: rgba(255,255,255,0.96);
      border: 1px solid rgba(255,255,255,0.72); box-shadow: 0 16px 30px rgba(24,58,102,0.16);
    }
    .dialogue-card { padding: 20px; }
    .dialogue-top { display: flex; justify-content: space-between; align-items: center; gap: 12px; margin-bottom: 12px; }
    .dialogue-top span { color: rgba(43,103,179,0.72); font-size: 12px; letter-spacing: 0.16em; font-weight: 900; }
    .dialogue-top strong { display: block; color: var(--navy); font-size: 14px; font-weight: 900; }
    .chip { padding: 7px 12px; border-radius: 999px; background: #eaf6ff; color: var(--blue); font-size: 12px; font-weight: 900; }
    .dialogue-text {
      min-height: 92px; white-space: pre-line; color: var(--navy);
      font-size: 20px; line-height: 1.6; font-weight: 900;
    }
    .cursor { color: #ff6b63; animation: blink 0.9s step-end infinite; }
    .buttons { display: grid; gap: 10px; margin-top: 18px; }
    .btn {
      border: none; border-radius: 18px; min-height: 52px; padding: 14px 18px;
      font-family: inherit; font-size: 15px; font-weight: 900; cursor: pointer;
      transition: transform 0.18s ease, filter 0.18s ease;
    }
    .btn:hover { transform: translateY(-1px); filter: brightness(1.02); }
    .btn-primary { background: var(--yellow); color: var(--navy); box-shadow: 0 14px 24px rgba(255,214,90,0.34); }
    .btn-secondary { background: #fff; color: var(--navy); border: 1px solid rgba(24,58,102,0.08); }
    .info-card { padding: 18px; }
    .info-head { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; }
    .info-head h2 { color: var(--navy); font-size: 22px; line-height: 1.1; margin-top: 4px; }
    .info-head p { color: rgba(43,103,179,0.82); font-size: 13px; line-height: 1.7; margin-top: 10px; font-weight: 700; }
    .progress {
      min-width: 82px; padding: 10px 12px; border-radius: 18px; text-align: right;
      background: #ebf7ff; color: var(--blue); font-size: 12px; font-weight: 900;
    }
    .progress strong { display: block; color: var(--navy); font-size: 18px; margin-top: 4px; }
    .map-card { padding: 12px; }
    .map-canvas {
      position: relative; aspect-ratio: 9 / 14; overflow: hidden; border-radius: 24px;
      border: 1px solid rgba(255,255,255,0.7);
    }
    .map-canvas img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .map-canvas::after {
      content: ""; position: absolute; inset: 0; pointer-events: none;
      background: linear-gradient(180deg, rgba(255,255,255,0.04), rgba(24,58,102,0.1));
    }
    .marker {
      position: absolute; transform: translate(-50%, -50%); display: flex; flex-direction: column;
      align-items: center; gap: 8px; border: none; background: transparent; cursor: pointer; z-index: 2;
    }
    .marker-core {
      position: relative; width: 50px; height: 50px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      background: var(--red); border: 3px solid #fff; color: #fff; font-size: 28px; font-weight: 900;
      box-shadow: 0 12px 20px rgba(255,93,93,0.36);
    }
    .marker-core::before {
      content: ""; position: absolute; inset: -2px; border-radius: inherit; z-index: -1;
      background: rgba(255,93,93,0.45); animation: markerPulse 1.8s ease-out infinite;
    }
    .marker-label {
      padding: 7px 12px; border-radius: 999px; background: rgba(255,255,255,0.95);
      color: var(--navy); font-size: 12px; font-weight: 900; white-space: nowrap;
      box-shadow: 0 10px 16px rgba(24,58,102,0.12);
    }
    .marker-done {
      position: absolute; right: -2px; top: -2px; width: 18px; height: 18px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center; background: var(--yellow);
      color: var(--navy); font-size: 11px; font-weight: 900; border: 1px solid #fff;
    }
    .tip-card {
      padding: 16px 18px; border-radius: 26px; background: var(--navy); color: rgba(255,255,255,0.9);
      box-shadow: 0 16px 30px rgba(24,58,102,0.16);
    }
    .tip-card strong { display: block; color: #a6d8ff; font-size: 12px; letter-spacing: 0.16em; margin-bottom: 8px; }
    .tip-card p { font-size: 13px; line-height: 1.7; font-weight: 700; }
    .quest-panel { position: absolute; inset: auto 0 0; z-index: 5; padding: 16px 14px 10px; }
    .quest-card {
      padding: 20px; border-radius: 30px 30px 24px 24px; background: rgba(255,255,255,0.98);
      border: 1px solid rgba(255,255,255,0.8); box-shadow: 0 -16px 30px rgba(24,58,102,0.18);
    }
    .quest-handle { width: 58px; height: 6px; margin: 0 auto 16px; border-radius: 999px; background: #d5edf9; }
    .quest-badge {
      display: inline-flex; padding: 7px 12px; border-radius: 999px;
      background: #ecf7ff; color: var(--blue); font-size: 12px; font-weight: 900;
    }
    .quest-card h3 { color: var(--navy); font-size: 26px; line-height: 1.15; margin-top: 14px; }
    .quest-card p { color: rgba(43,103,179,0.82); font-size: 14px; line-height: 1.75; margin-top: 12px; font-weight: 700; }
    .quest-location { margin-top: 16px; padding: 14px 16px; border-radius: 18px; background: var(--cream); color: var(--navy); font-size: 14px; font-weight: 900; }
    .complete { position: relative; min-height: 676px; }
    .confetti-zone { position: absolute; inset: 0 0 auto; height: 164px; overflow: hidden; pointer-events: none; }
    .confetti { position: absolute; top: -6px; width: 10px; height: 18px; border-radius: 4px; animation: confetti 2.8s ease-in-out infinite; }
    .complete .scene-title { text-align: center; font-size: clamp(1.95rem, 6vw, 2.4rem); }
    .complete .scene-subtitle { max-width: none; text-align: center; }
    .complete-card { padding: 18px; text-align: center; }
    .complete-card strong { display: block; color: rgba(43,103,179,0.72); font-size: 12px; letter-spacing: 0.16em; margin-bottom: 8px; }
    .complete-card h4 { color: var(--navy); font-size: 22px; margin-bottom: 8px; }
    .complete-card p { color: rgba(43,103,179,0.82); font-size: 14px; line-height: 1.7; font-weight: 700; }
    .streak-card {
      padding: 20px; border-radius: 28px; background: linear-gradient(180deg, #fff7df, #fff1b8);
      border: 1px solid rgba(255,255,255,0.72); box-shadow: 0 16px 30px rgba(24,58,102,0.16);
    }
    .streak-chip {
      display: inline-flex; padding: 8px 12px; border-radius: 999px;
      background: rgba(255,255,255,0.78); color: var(--navy); font-size: 12px; font-weight: 900;
    }
    .streak-card h4 { color: var(--navy); font-size: 22px; margin-top: 16px; }
    .streak-card p { color: rgba(43,103,179,0.84); font-size: 14px; line-height: 1.7; margin-top: 8px; font-weight: 700; }
    .streak-value {
      margin-top: 16px; padding: 16px; text-align: center; border-radius: 18px;
      background: rgba(255,255,255,0.82); color: var(--navy); font-size: 22px; font-weight: 900;
    }
    @keyframes bob { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
    @keyframes sparkle { 0%,100% { opacity: 0.35; transform: scale(0.92) rotate(0deg); } 50% { opacity: 1; transform: scale(1.18) rotate(14deg); } }
    @keyframes markerPulse { 0% { transform: scale(0.92); opacity: 0.72; } 70% { transform: scale(1.34); opacity: 0; } 100% { transform: scale(1.34); opacity: 0; } }
    @keyframes confetti { 0% { transform: translateY(-12px) rotate(0deg); opacity: 0; } 14% { opacity: 1; } 100% { transform: translateY(44px) rotate(220deg); opacity: 0; } }
    @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0; } }
    @media (max-width: 960px) {
      .page { grid-template-columns: 1fr; padding: 12px 16px 28px; }
    }
    @media (max-width: 480px) {
      .back-link { padding: 18px 16px 0; }
      .page { padding: 10px 12px 24px; }
      .copy { padding: 20px; }
      .frame { border-radius: 28px; padding: 8px; }
      .frame-inner { min-height: 744px; border-radius: 24px; }
      .shell-top { margin: 10px 10px 0; }
      #app { padding: 14px 10px 12px; min-height: 690px; }
      .dialogue-text { font-size: 18px; }
    }
  </style>
</head>
<body>
  <canvas id="starsCanvas"></canvas>
  <a class="back-link" href="index.html">← 쇼케이스로 돌아가기</a>
  <div class="page">
    <section class="copy">
      <div class="eyebrow">캠퍼스 퀘스트 데모</div>
      <h1>산지니 원정대</h1>
      <p>
        산지니가 인트로에서 반겨주고, 지도에서 퀘스트를 고른 뒤 완료 보상까지 이어지는
        캠퍼스 어드벤처 웹 데모다. 쇼케이스 안에서 바로 열어볼 수 있도록 단일 정적 페이지로 묶었다.
      </p>
      <div class="copy-list">
        <div class="copy-item">
          <div><strong>인트로 대사 진행</strong><span>세 단계 대사를 넘기면 지도 열기로 자연스럽게 이어진다.</span></div>
        </div>
        <div class="copy-item">
          <div><strong>지도 기반 퀘스트 선택</strong><span>도서관, 학생회관, 금정산 마커를 눌러 퀘스트를 시작한다.</span></div>
        </div>
        <div class="copy-item">
          <div><strong>스트릭 보상</strong><span>첫 완료 시에만 연속 기록 카드가 보이고 같은 세션에서는 중복 증가하지 않는다.</span></div>
        </div>
      </div>
      <button id="themeToggle" class="theme-toggle" type="button">☀️ 라이트 배경</button>
    </section>

    <section class="frame">
      <div class="frame-inner">
        <div class="shell-top">
          <div>
            <small>산지니 원정대</small>
            <strong id="frameTitle">인트로</strong>
          </div>
          <div id="frameStreak" class="streak-pill">연속 0일</div>
        </div>
        <div id="app"></div>
      </div>
    </section>
  </div>

  <script>
    const dialogues = [
      "안녕!\n산지니 원정대에 온 걸 환영해!",
      "오늘도 캠퍼스에\n새로운 모험이 기다리고 있어!",
      "오늘의 퀘스트를 확인해볼까?"
    ];

    const quests = [
      { id: "library", title: "도서관 탐험", description: "오늘 도서관에 가서 공부 인증을 해보자!", locationLabel: "도서관", top: "36%", left: "31%" },
      { id: "student-center", title: "학생회관 점심 미션", description: "학생회관에서 오늘의 메뉴를 먹고 잠깐 쉬어가자!", locationLabel: "학생회관", top: "66%", left: "51%" },
      { id: "mountain", title: "금정산 산책", description: "금정산 쪽으로 걸어가며 캠퍼스 바깥 풍경도 느껴보자!", locationLabel: "금정산", top: "26%", left: "72%" }
    ];

    const state = {
      currentState: "intro",
      activeDialogueIndex: 0,
      selectedQuestId: null,
      streakCount: 0,
      completedToday: false,
      completedQuestIds: [],
      showStreakCard: false,
      visibleDialogue: "",
      isTyping: true
    };

    const app = document.getElementById("app");
    const frameTitle = document.getElementById("frameTitle");
    const frameStreak = document.getElementById("frameStreak");
    const themeToggle = document.getElementById("themeToggle");
    let typingTimer = null;

    function questById(id) {
      return quests.find((quest) => quest.id === id) || null;
    }

    function setFrameMeta() {
      frameTitle.textContent =
        state.currentState === "intro" ? "인트로" :
        state.currentState === "map" ? "지도" :
        state.currentState === "quest" ? "퀘스트" : "완료";
      frameStreak.textContent = `연속 ${state.streakCount}일`;
    }

    function escapeHtml(text) {
      return text.replaceAll("&", "&amp;").replaceAll("<", "&lt;").replaceAll(">", "&gt;");
    }

    function renderCharacter(variant) {
      const cheer = variant === "celebrate";
      return `
        <div class="character-wrap">
          <div class="character-card ${cheer ? "celebrate" : ""}">
            <div class="visual"><img src="sanjini.png" alt="산지니 캐릭터" /></div>
            <div class="bubble left">${cheer ? "해냈어!" : "반가워!"}</div>
            <div class="bubble right">${cheer ? "축하해!" : "모험 출발"}</div>
            <span class="sparkle one">✦</span>
            <span class="sparkle two">✦</span>
          </div>
        </div>
      `;
    }

    function renderIntro() {
      return `
        <section class="scene">
          <div>
            <div class="pill">캠퍼스 미션 어드벤처</div>
            <h1 class="scene-title">산지니 원정대</h1>
            <p class="scene-subtitle">산지니와 함께 오늘의 캠퍼스 모험을 시작해 보자.</p>
          </div>
          ${renderCharacter("idle")}
          <div class="card dialogue-card">
            <div class="dialogue-top">
              <div><span>대화</span><strong>대화 ${state.activeDialogueIndex + 1} / ${dialogues.length}</strong></div>
              <div class="chip">산지니 안내</div>
            </div>
            <div class="dialogue-text">${escapeHtml(state.visibleDialogue)}${state.isTyping ? '<span class="cursor">|</span>' : ""}</div>
            <div class="buttons">
              <button class="btn btn-primary" type="button" data-action="intro-next">${state.activeDialogueIndex === dialogues.length - 1 ? "지도 열기" : "다음"}</button>
            </div>
          </div>
        </section>
      `;
    }

    function renderMarkers() {
      return quests.map((quest) => `
        <button class="marker" type="button" data-action="select-quest" data-id="${quest.id}" style="top:${quest.top};left:${quest.left};" aria-label="${quest.locationLabel} 퀘스트 열기">
          <span class="marker-core">!</span>
          ${state.completedQuestIds.includes(quest.id) ? '<span class="marker-done">✓</span>' : ""}
          <span class="marker-label">${quest.locationLabel}</span>
        </button>
      `).join("");
    }

    function renderQuestPanel() {
      const quest = questById(state.selectedQuestId);
      if (!quest) return "";
      return `
        <div class="quest-panel">
          <div class="quest-card">
            <div class="quest-handle"></div>
            <div class="quest-badge">${quest.locationLabel}</div>
            <h3>${quest.title}</h3>
            <p>${quest.description}</p>
            <div class="quest-location">오늘의 위치: ${quest.locationLabel}</div>
            <div class="buttons">
              <button class="btn btn-primary" type="button" data-action="complete-quest">퀘스트 완료</button>
              <button class="btn btn-secondary" type="button" data-action="back-map">지도로 돌아가기</button>
            </div>
          </div>
        </div>
      `;
    }

    function renderMap(withPanel) {
      return `
        <section class="scene">
          <div class="card info-card">
            <div class="info-head">
              <div>
                <div class="pill">탐험 지도</div>
                <h2>오늘의 탐험 지도</h2>
                <p>빨간 마커를 눌러 오늘의 캠퍼스 미션을 골라보자.</p>
              </div>
              <div class="progress">진행 현황<strong>${state.completedQuestIds.length} / ${quests.length}</strong></div>
            </div>
          </div>
          <div class="card map-card">
            <div class="map-canvas">
              <img src="campus-map.png" alt="캠퍼스 지도" />
              ${renderMarkers()}
              ${withPanel ? renderQuestPanel() : ""}
            </div>
          </div>
          <div class="tip-card">
            <strong>탐험 팁</strong>
            <p>도서관, 학생회관, 금정산 중 한 곳을 눌러 퀘스트를 시작할 수 있어.</p>
          </div>
        </section>
      `;
    }

    function renderComplete() {
      const quest = questById(state.selectedQuestId);
      const confetti = [
        { left: "10%", delay: "0s", color: "#ffd65a" },
        { left: "24%", delay: "0.4s", color: "#93d3ff" },
        { left: "38%", delay: "0.8s", color: "#ff8a80" },
        { left: "54%", delay: "0.2s", color: "#ffd65a" },
        { left: "67%", delay: "0.7s", color: "#79cbff" },
        { left: "81%", delay: "0.3s", color: "#ff6b63" }
      ];
      return `
        <section class="scene complete">
          <div class="confetti-zone">
            ${confetti.map((piece) => `<span class="confetti" style="left:${piece.left};animation-delay:${piece.delay};background:${piece.color};"></span>`).join("")}
          </div>
          <div>
            <div class="pill" style="margin:0 auto;display:flex;width:max-content;">퀘스트 완료</div>
            <h1 class="scene-title">와! 퀘스트를 완료했어!<br />정말 대단해!</h1>
            <p class="scene-subtitle">이번에 해낸 모험: ${quest ? quest.title : "캠퍼스 미션"}</p>
          </div>
          ${renderCharacter("celebrate")}
          <div class="card complete-card">
            <strong>미션 완료</strong>
            <h4>${quest ? `${quest.locationLabel} 미션 성공!` : "퀘스트 성공!"}</h4>
            <p>산지니가 다음 탐험도 기다리고 있어.</p>
          </div>
          ${state.showStreakCard ? `
            <div class="streak-card">
              <div class="streak-chip">🔥 연속 기록 달성!</div>
              <h4>오늘도 모험 성공!</h4>
              <p>연속 기록을 이어가고 있어!</p>
              <div class="streak-value">연속 ${state.streakCount}일 달성</div>
            </div>
          ` : ""}
          <div class="buttons">
            <button class="btn btn-secondary" type="button" data-action="back-map">지도로 돌아가기</button>
          </div>
        </section>
      `;
    }

    function render() {
      setFrameMeta();
      app.innerHTML =
        state.currentState === "intro" ? renderIntro() :
        state.currentState === "map" ? renderMap(false) :
        state.currentState === "quest" ? renderMap(true) :
        renderComplete();
      bind();
    }

    function bind() {
      const introButton = app.querySelector('[data-action="intro-next"]');
      if (introButton) introButton.onclick = handleIntroAction;

      app.querySelectorAll('[data-action="select-quest"]').forEach((button) => {
        button.onclick = () => {
          state.selectedQuestId = button.dataset.id;
          state.currentState = "quest";
          render();
        };
      });

      const completeButton = app.querySelector('[data-action="complete-quest"]');
      if (completeButton) completeButton.onclick = handleQuestComplete;

      app.querySelectorAll('[data-action="back-map"]').forEach((button) => {
        button.onclick = () => {
          state.currentState = "map";
          state.selectedQuestId = null;
          state.showStreakCard = false;
          render();
        };
      });
    }

    function clearTyping() {
      if (typingTimer) {
        window.clearInterval(typingTimer);
        typingTimer = null;
      }
    }

    function revealDialogue() {
      clearTyping();
      state.visibleDialogue = dialogues[state.activeDialogueIndex];
      state.isTyping = false;
      render();
    }

    function startTyping(text) {
      clearTyping();
      state.visibleDialogue = "";
      state.isTyping = true;
      render();
      let index = 0;
      typingTimer = window.setInterval(() => {
        index += 1;
        state.visibleDialogue = text.slice(0, index);
        render();
        if (index >= text.length) {
          clearTyping();
          state.isTyping = false;
          render();
        }
      }, 28);
    }

    function handleIntroAction() {
      if (state.isTyping) {
        revealDialogue();
        return;
      }
      if (state.activeDialogueIndex < dialogues.length - 1) {
        state.activeDialogueIndex += 1;
        startTyping(dialogues[state.activeDialogueIndex]);
        return;
      }
      state.currentState = "map";
      render();
    }

    function handleQuestComplete() {
      if (!state.selectedQuestId) return;
      const first = !state.completedToday;
      if (!state.completedQuestIds.includes(state.selectedQuestId)) {
        state.completedQuestIds = [...state.completedQuestIds, state.selectedQuestId];
      }
      if (first) {
        state.streakCount += 1;
        state.completedToday = true;
      }
      state.showStreakCard = first;
      state.currentState = "questComplete";
      render();
    }

    function applyTheme(theme) {
      document.documentElement.setAttribute("data-theme", theme);
      localStorage.setItem("sanjini-theme", theme);
      themeToggle.textContent = theme === "dark" ? "☀️ 라이트 배경" : "🌙 다크 배경";
    }

    themeToggle.onclick = () => {
      const next = document.documentElement.getAttribute("data-theme") === "dark" ? "light" : "dark";
      applyTheme(next);
    };

    applyTheme(localStorage.getItem("sanjini-theme") || "dark");
    startTyping(dialogues[0]);
  </script>
  <script>
    (function() {
      const canvas = document.getElementById("starsCanvas");
      const ctx = canvas.getContext("2d");
      let width = 0;
      let height = 0;
      const stars = [];
      const colors = [[200,220,255],[255,240,230],[255,210,180],[180,200,255],[255,255,255]];
      function resize() {
        const dpr = Math.min(window.devicePixelRatio || 1, 2);
        width = canvas.offsetWidth * dpr;
        height = canvas.offsetHeight * dpr;
        canvas.width = width;
        canvas.height = height;
      }
      resize();
      window.addEventListener("resize", resize);
      [{ count: 240, maxR: 1 }, { count: 90, maxR: 2 }, { count: 40, maxR: 3.5 }].forEach((layer) => {
        for (let i = 0; i < layer.count; i += 1) {
          stars.push({
            x: Math.random(),
            y: Math.random(),
            r: Math.random() * layer.maxR + 0.3,
            phase: Math.random() * Math.PI * 2,
            speed: 0.004 + Math.random() * 0.012,
            color: colors[Math.floor(Math.random() * colors.length)],
            bright: 0.45 + Math.random() * 0.55,
            min: 0.14 + Math.random() * 0.22
          });
        }
      });
      let frame = 0;
      function draw() {
        frame += 1;
        ctx.clearRect(0, 0, width, height);
        stars.forEach((star) => {
          const sx = star.x * width;
          const sy = star.y * height;
          const twinkle = Math.sin(frame * star.speed + star.phase);
          const alpha = star.min + (star.bright - star.min) * (0.5 + twinkle * 0.5);
          const [r, g, b] = star.color;
          if (star.r > 1.5) {
            const glow = ctx.createRadialGradient(sx, sy, 0, sx, sy, star.r * 5);
            glow.addColorStop(0, `rgba(${r},${g},${b},${alpha * 0.22})`);
            glow.addColorStop(1, "transparent");
            ctx.fillStyle = glow;
            ctx.beginPath();
            ctx.arc(sx, sy, star.r * 5, 0, Math.PI * 2);
            ctx.fill();
          }
          ctx.beginPath();
          ctx.arc(sx, sy, star.r, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(${r},${g},${b},${alpha})`;
          ctx.fill();
        });
        requestAnimationFrame(draw);
      }
      draw();
    })();
  </script>
</body>
